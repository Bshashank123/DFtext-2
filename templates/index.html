<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DFText — Handwriting Forgery Detector</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0e1117;
      color: #e0e0e0;
      min-height: 100vh;
    }

    header {
      background: #161b27;
      border-bottom: 1px solid #2a2f3e;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; color: #fff; }
    header span { font-size: 0.85rem; color: #7a8499; }
    .badge {
      background: #1e3a5f;
      color: #5ea8f0;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-left: auto;
    }

    .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

    .upload-card {
      background: #161b27;
      border: 2px dashed #2a2f3e;
      border-radius: 12px;
      padding: 48px 32px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    .upload-card:hover, .upload-card.drag-over {
      border-color: #4a90d9;
      background: #192235;
    }
    .upload-card input[type=file] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer;
    }
    .upload-icon { font-size: 3rem; margin-bottom: 12px; }
    .upload-card h2 { font-size: 1.2rem; color: #c8d0e0; margin-bottom: 8px; }
    .upload-card p  { font-size: 0.85rem; color: #5c6680; }

    .btn {
      display: inline-block;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-secondary { background: #232b3e; color: #a0b0cc; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .action-row {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      justify-content: center;
    }

    #preview-container {
      margin-top: 20px;
      display: none;
      text-align: center;
    }
    #preview-img {
      max-width: 100%;
      max-height: 300px;
      border-radius: 8px;
      border: 1px solid #2a2f3e;
    }

    .spinner {
      display: none;
      text-align: center;
      padding: 40px;
      font-size: 0.95rem;
      color: #7a8499;
    }
    .spinner::before {
      content: '';
      display: block;
      width: 40px;
      height: 40px;
      border: 4px solid #2a2f3e;
      border-top-color: #2563eb;
      border-radius: 50%;
      margin: 0 auto 16px;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #results { display: none; margin-top: 32px; }

    .verdict-card {
      border-radius: 12px;
      padding: 24px 28px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .verdict-authentic { background: #0d2918; border: 1px solid #1a5c33; }
    .verdict-suspicious { background: #2a1f0a; border: 1px solid #7a5010; }
    .verdict-ai         { background: #2a0d0d; border: 1px solid #7a1a1a; }

    .verdict-icon { font-size: 2.8rem; }
    .verdict-text h2 { font-size: 1.5rem; font-weight: 700; }
    .verdict-text .sub { font-size: 0.9rem; color: #8090a8; margin-top: 4px; }
    .verdict-authentic .verdict-text h2 { color: #4ade80; }
    .verdict-suspicious .verdict-text h2 { color: #fbbf24; }
    .verdict-ai .verdict-text h2         { color: #f87171; }

    .confidence-bar {
      margin-left: auto;
      text-align: center;
    }
    .confidence-bar .num {
      font-size: 2rem;
      font-weight: 800;
      color: #e0e8ff;
    }
    .confidence-bar .label {
      font-size: 0.75rem;
      color: #5c6680;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }
    @media (max-width: 700px) { .grid-2 { grid-template-columns: 1fr; } }

    .card {
      background: #161b27;
      border: 1px solid #2a2f3e;
      border-radius: 10px;
      padding: 20px;
    }
    .card h3 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #5c6680;
      margin-bottom: 16px;
    }

    .score-row {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
      gap: 10px;
    }
    .score-label { width: 80px; font-size: 0.85rem; color: #a0b0cc; }
    .score-bar-bg {
      flex: 1;
      height: 8px;
      background: #232b3e;
      border-radius: 4px;
      overflow: hidden;
    }
    .score-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }
    .score-val { width: 38px; font-size: 0.8rem; color: #8090a8; text-align: right; }

    .region-list { max-height: 280px; overflow-y: auto; }
    .region-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 6px;
      font-size: 0.85rem;
    }
    .region-suspicious { background: #2a0d0d; }
    .region-moderate   { background: #2a1f0a; }
    .region-normal     { background: #0d1f17; }
    .tag {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .tag-suspicious { background: #7f1d1d; color: #fca5a5; }
    .tag-moderate   { background: #78350f; color: #fde68a; }
    .tag-normal     { background: #14532d; color: #86efac; }

    .image-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }
    .image-row .card img {
      width: 100%;
      border-radius: 6px;
      margin-top: 8px;
    }

    .error-box {
      background: #2a0d0d;
      border: 1px solid #7a1a1a;
      border-radius: 10px;
      padding: 20px;
      color: #f87171;
      display: none;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<header>
  <div>🔬</div>
  <h1>DFText</h1>
  <span>Handwriting Forgery Detector</span>
  <div class="badge">Micro-texture Forensics</div>
</header>

<div class="container">

  <!-- Upload -->
  <div class="upload-card" id="drop-zone">
    <input type="file" id="file-input" accept=".png,.jpg,.jpeg,.bmp,.tiff">
    <div class="upload-icon">📄</div>
    <h2>Drop a handwritten document image</h2>
    <p>PNG, JPG, JPEG, BMP, TIFF — max 16MB</p>
  </div>

  <div id="preview-container">
    <img id="preview-img" src="" alt="Preview">
  </div>

  <div class="action-row">
    <button class="btn btn-primary" id="analyze-btn" disabled onclick="analyzeImage()">
      Analyze Document
    </button>
    <button class="btn btn-secondary" onclick="reset()">Clear</button>
  </div>

  <div class="error-box" id="error-box"></div>

  <!-- Spinner -->
  <div class="spinner" id="spinner">Analyzing image forensics…</div>

  <!-- Results -->
  <div id="results">

    <div class="verdict-card" id="verdict-card">
      <div class="verdict-icon" id="verdict-icon"></div>
      <div class="verdict-text">
        <h2 id="verdict-text"></h2>
        <div class="sub" id="verdict-sub"></div>
      </div>
      <div class="confidence-bar">
        <div class="num" id="confidence-num"></div>
        <div class="label">Confidence</div>
      </div>
    </div>

    <div class="grid-2">
      <!-- Global Forensics Scores -->
      <div class="card">
        <h3>Global Forensics Scores</h3>
        <div id="global-scores"></div>
      </div>
      <!-- Region Summary -->
      <div class="card">
        <h3>Region Summary</h3>
        <div id="region-summary"></div>
      </div>
    </div>

    <!-- Annotated Images -->
    <div class="image-row">
      <div class="card">
        <h3>Forensic Annotation</h3>
        <img id="annotated-img" src="" alt="Annotated">
      </div>
      <div class="card">
        <h3>Anomaly Heatmap</h3>
        <img id="heatmap-img" src="" alt="Heatmap">
      </div>
    </div>

    <!-- Region Details -->
    <div class="card">
      <h3>Region Details</h3>
      <div class="region-list" id="region-list"></div>
    </div>

  </div>
</div>

<script>
let selectedFile = null;

const fileInput    = document.getElementById('file-input');
const dropZone     = document.getElementById('drop-zone');
const analyzeBtn   = document.getElementById('analyze-btn');
const previewCont  = document.getElementById('preview-container');
const previewImg   = document.getElementById('preview-img');

fileInput.addEventListener('change', e => setFile(e.target.files[0]));

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f) setFile(f);
});

function setFile(file) {
  if (!file) return;
  selectedFile = file;
  const reader = new FileReader();
  reader.onload = ev => {
    previewImg.src = ev.target.result;
    previewCont.style.display = 'block';
  };
  reader.readAsDataURL(file);
  analyzeBtn.disabled = false;
  document.getElementById('results').style.display = 'none';
  document.getElementById('error-box').style.display = 'none';
}

function reset() {
  selectedFile = null;
  fileInput.value = '';
  previewCont.style.display = 'none';
  document.getElementById('results').style.display = 'none';
  document.getElementById('error-box').style.display = 'none';
  document.getElementById('spinner').style.display = 'none';
  analyzeBtn.disabled = true;
}

async function analyzeImage() {
  if (!selectedFile) return;

  document.getElementById('spinner').style.display = 'block';
  document.getElementById('results').style.display = 'none';
  document.getElementById('error-box').style.display = 'none';
  analyzeBtn.disabled = true;

  const formData = new FormData();
  formData.append('file', selectedFile);

  try {
    const res  = await fetch('/analyze', { method: 'POST', body: formData });
    const data = await res.json();

    document.getElementById('spinner').style.display = 'none';
    analyzeBtn.disabled = false;

    if (data.error) {
      showError(data.error);
      return;
    }

    renderResults(data);

  } catch (err) {
    document.getElementById('spinner').style.display = 'none';
    analyzeBtn.disabled = false;
    showError('Request failed: ' + err.message);
  }
}

function showError(msg) {
  const box = document.getElementById('error-box');
  box.textContent = '⚠ ' + msg;
  box.style.display = 'block';
}

function scoreColor(score) {
  if (score > 0.65) return '#f87171';
  if (score > 0.45) return '#fbbf24';
  return '#4ade80';
}

function renderResults(data) {
  // Verdict card
  const verdictCard = document.getElementById('verdict-card');
  verdictCard.className = 'verdict-card';
  let icon = '✅', cls = 'verdict-authentic', sub = 'No strong synthetic indicators detected.';
  if (data.verdict === 'AI Edit Likely') {
    icon = '🚨'; cls = 'verdict-ai';
    sub = `${data.suspicious_regions} of ${data.region_count} regions flagged as suspicious.`;
  } else if (data.verdict === 'Suspicious') {
    icon = '⚠️'; cls = 'verdict-suspicious';
    sub = `${data.suspicious_regions} region(s) show anomalous texture patterns.`;
  }
  verdictCard.classList.add(cls);
  document.getElementById('verdict-icon').textContent = icon;
  document.getElementById('verdict-text').textContent = data.verdict;
  document.getElementById('verdict-sub').textContent = sub;
  document.getElementById('confidence-num').textContent = data.confidence + '%';

  // Global scores
  const gf = data.global_forensics;
  const scoreKeys = ['noise', 'stroke', 'paper', 'image_forensics'];
  const scoreLabels = { noise: 'Noise', stroke: 'Stroke', paper: 'Paper', image_forensics: 'Overall' };
  let scoresHtml = '';
  for (const key of scoreKeys) {
    const val = gf[key];
    scoresHtml += `
      <div class="score-row">
        <span class="score-label">${scoreLabels[key]}</span>
        <div class="score-bar-bg">
          <div class="score-bar-fill" style="width:${val*100}%;background:${scoreColor(val)}"></div>
        </div>
        <span class="score-val">${val.toFixed(2)}</span>
      </div>`;
  }
  document.getElementById('global-scores').innerHTML = scoresHtml;

  // Region summary
  const suspicious = data.region_results.filter(r => r.status === 'suspicious').length;
  const moderate   = data.region_results.filter(r => r.status === 'moderate').length;
  const normal     = data.region_results.filter(r => r.status === 'normal').length;
  document.getElementById('region-summary').innerHTML = `
    <div style="font-size:2rem;font-weight:800;color:#e0e8ff;margin-bottom:8px">${data.region_count}</div>
    <div style="font-size:0.85rem;color:#5c6680;margin-bottom:16px">regions analyzed</div>
    <div style="display:flex;gap:12px;flex-wrap:wrap">
      <span class="tag tag-suspicious">🔴 ${suspicious} suspicious</span>
      <span class="tag tag-moderate">🟡 ${moderate} moderate</span>
      <span class="tag tag-normal">🟢 ${normal} normal</span>
    </div>
    <div style="margin-top:16px;font-size:0.9rem;color:#a0b0cc">
      Overall score: <strong style="color:#e0e8ff">${data.overall_score.toFixed(3)}</strong>
    </div>`;

  // Images
  document.getElementById('annotated-img').src = data.annotated_image || '';
  document.getElementById('heatmap-img').src   = data.heatmap_image   || '';

  // Region details
  let regionsHtml = '';
  const sorted = [...data.region_results].sort((a, b) => b.score - a.score);
  for (const r of sorted) {
    const cls2 = `region-${r.status}`;
    const tagCls = `tag-${r.status}`;
    const [x1, y1, x2, y2] = r.box;
    regionsHtml += `
      <div class="region-item ${cls2}">
        <span>Region at (${x1},${y1})→(${x2},${y2})</span>
        <span style="display:flex;align-items:center;gap:8px">
          <span style="color:#7a8499;font-size:0.8rem">${r.score.toFixed(3)}</span>
          <span class="tag ${tagCls}">${r.status}</span>
        </span>
      </div>`;
  }
  document.getElementById('region-list').innerHTML = regionsHtml || '<p style="color:#5c6680">No regions detected</p>';

  document.getElementById('results').style.display = 'block';
  document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
}
</script>
</body>
</html>
